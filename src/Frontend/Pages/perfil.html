<!doctype html>
<html lang="pt-AO">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meu Perfil | AngoChina</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/css/perfil.css" />
  </head>
  <body>
    <main class="profile-layout">
      <aside class="profile-sidebar">
        <div class="user-brief">
          <div class="avatar">
            <i class="bi bi-person-fill"></i>
          </div>
          <div class="user-info">
            <h3 id="userName">Usuário AngoChina</h3>
            <p id="userEmail">usuario@email.com</p>
          </div>
        </div>

        <nav class="profile-nav">
          <a href="#" class="nav-item active"
            ><i class="bi bi-person"></i> Meus Dados</a
          >
          <a href="./pedidos.html" class="nav-item"
            ><i class="bi bi-box-seam"></i> Meus Pedidos</a
          >
          <a href="./enderecos.html" class="nav-item"
            ><i class="bi bi-geo-alt"></i> Endereços</a
          >
          <a href="#" class="nav-item"
            ><i class="bi bi-shield-lock"></i> Segurança</a
          >
          <hr />
          <a href="index.html" class="nav-item logout"
            ><i class="bi bi-box-arrow-right"></i> Sair</a
          >
        </nav>
      </aside>

      <section class="profile-content">
        <div class="content-card">
          <h2>Dados Pessoais</h2>
          <p class="section-desc">Gerencie as suas informações de contacto.</p>

          <form class="profile-form">
            <div class="form-group">
              <label>Nome Completo</label>
              <input type="text" value="Usuário AngoChina" />
            </div>

            <div class="form-row">
              <div class="form-group">
                <label>E-mail</label>
                <input type="email" value="usuario@email.com" disabled />
              </div>
              <div class="form-group">
                <label>Telefone</label>
                <input type="tel" value="+244 9xx xxx xxx" />
              </div>
            </div>

            <button type="submit" class="btn-save">Guardar Alterações</button>
          </form>
        </div>

        <div class="content-card">
          <h3>Último Pedido</h3>
          <div class="order-summary-card">
            <div class="order-header">
              <span>Pedido #8902</span>
              <span class="status-tag processando">Processando</span>
            </div>
            <div class="order-details">
              <p>Data: 26 de Março, 2026</p>
              <p>Total: <strong>27.600 Kz</strong></p>
            </div>
            <a href="#" class="view-order">Ver detalhes</a>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
